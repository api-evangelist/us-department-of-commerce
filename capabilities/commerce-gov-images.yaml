naftiko: 1.0.0-alpha2
info:
  label: Commerce.gov API — Images
  description: 'Commerce.gov API — Images. 1 operations. Lead operation: List Images. Self-contained Naftiko capability covering
    one Us Department Of Commerce business surface.'
  tags:
  - Us Department Of Commerce
  - Images
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_DEPARTMENT_OF_COMMERCE_API_KEY: US_DEPARTMENT_OF_COMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: commerce-gov-images
    baseUri: https://www.commerce.gov
    description: Commerce.gov API — Images business capability. Self-contained, no shared references.
    resources:
    - name: api-image
      path: /api/image
      operations:
      - name: listimages
        method: GET
        description: List Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: items_per_page
          in: query
          type: integer
          description: Number of items to return per page
  exposes:
  - type: rest
    namespace: commerce-gov-images-rest
    port: 8080
    description: REST adapter for Commerce.gov API — Images. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/image
      name: api-image
      description: REST surface for api-image.
      operations:
      - method: GET
        name: listimages
        description: List Images
        call: commerce-gov-images.listimages
        with:
          page: rest.page
          items_per_page: rest.items_per_page
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-gov-images-mcp
    port: 9090
    transport: http
    description: MCP adapter for Commerce.gov API — Images. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-images
      description: List Images
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-gov-images.listimages
      with:
        page: tools.page
        items_per_page: tools.items_per_page
      outputParameters:
      - type: object
        mapping: $.
