naftiko: 1.0.0-alpha2
info:
  label: Commerce.gov API — Blogs
  description: 'Commerce.gov API — Blogs. 2 operations. Lead operation: List Blog Posts. Self-contained Naftiko capability
    covering one Us Department Of Commerce business surface.'
  tags:
  - Us Department Of Commerce
  - Blogs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_DEPARTMENT_OF_COMMERCE_API_KEY: US_DEPARTMENT_OF_COMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: commerce-gov-blogs
    baseUri: https://www.commerce.gov
    description: Commerce.gov API — Blogs business capability. Self-contained, no shared references.
    resources:
    - name: api-blog
      path: /api/blog
      operations:
      - name: listblogs
        method: GET
        description: List Blog Posts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: items_per_page
          in: query
          type: integer
          description: Number of items to return per page
        - name: sort_by
          in: query
          type: string
          description: Field to sort results by
        - name: sort_order
          in: query
          type: string
          description: Sort direction
    - name: api-blog-id
      path: /api/blog/{id}
      operations:
      - name: getblogpost
        method: GET
        description: Get Blog Post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique identifier of the blog post
          required: true
  exposes:
  - type: rest
    namespace: commerce-gov-blogs-rest
    port: 8080
    description: REST adapter for Commerce.gov API — Blogs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/blog
      name: api-blog
      description: REST surface for api-blog.
      operations:
      - method: GET
        name: listblogs
        description: List Blog Posts
        call: commerce-gov-blogs.listblogs
        with:
          page: rest.page
          items_per_page: rest.items_per_page
          sort_by: rest.sort_by
          sort_order: rest.sort_order
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/blog/{id}
      name: api-blog-id
      description: REST surface for api-blog-id.
      operations:
      - method: GET
        name: getblogpost
        description: Get Blog Post
        call: commerce-gov-blogs.getblogpost
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: commerce-gov-blogs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Commerce.gov API — Blogs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-blog-posts
      description: List Blog Posts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-gov-blogs.listblogs
      with:
        page: tools.page
        items_per_page: tools.items_per_page
        sort_by: tools.sort_by
        sort_order: tools.sort_order
      outputParameters:
      - type: object
        mapping: $.
    - name: get-blog-post
      description: Get Blog Post
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: commerce-gov-blogs.getblogpost
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
